name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build MkDocs site
      run: .venv/bin/mkdocs build || mkdocs build

    - name: Install 64tass
      run: sudo apt-get update && sudo apt-get install -y 64tass

    - name: Assemble lesson examples
      run: |
        for d in src/*; do
          if [ -f "$d/main.asm" ]; then
            out="bin/$(basename $d).prg"
            64tass --cbm-prg -o "$out" "$d/main.asm"
          fi
        done
